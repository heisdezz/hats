name: Build Kernel with KernelSU Next

on:
  push:
    branches:
      - lineage-23.2
  pull_request:
    branches:
      - lineage-23.2
  workflow_dispatch:
    inputs:
      ksun_branch:
        description: "KernelSU Next branch/tag"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - dev
          - legacy
      upload_release:
        description: "Create GitHub Release"
        required: false
        default: false
        type: boolean

env:
  DEVICE: lisa
  ARCH: arm64
  # lisa/Lahaina defconfig — adjust if your tree uses a different path
  DEFCONFIG: vendor/lahaina-qgki_defconfig
  KERNEL_BRANCH: lineage-23.2
  CROSS_COMPILE: aarch64-linux-gnu-
  CROSS_COMPILE_ARM32: arm-linux-gnueabi-
  CLANG_DIR: ${{ github.workspace }}/toolchain/clang
  OUT_DIR: ${{ github.workspace }}/out

jobs:
  build:
    name: Build Kernel (KSU Next ${{ github.event.inputs.ksun_branch || 'stable' }})
    # Ubuntu 24.04 — GLIBC 2.39, required by Neutron Clang 18+
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      # ─── 1. Checkout kernel source ───────────────────────────────────────────
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.KERNEL_BRANCH }}
          fetch-depth: 1

      # ─── 2. Install build dependencies ───────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates curl flex \
            gcc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            git libelf-dev libssl-dev lz4 make \
            python3 zip zstd
          ldd --version | head -1

      # ─── 3. Download Clang toolchain (Neutron Clang) ─────────────────────────
      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ env.CLANG_DIR }}
          key: neutron-clang-20240101-v1

      - name: Download Neutron Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ env.CLANG_DIR }}"
          LATEST=$(curl -fsSL \
            "https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "==> Neutron Clang release: ${LATEST}"
          curl -fL --retry 5 --retry-delay 5 \
            "https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/${LATEST}/neutron-clang-${LATEST}.tar.zst" \
            -o /tmp/neutron-clang.tar.zst
          tar --use-compress-program=zstd -xf /tmp/neutron-clang.tar.zst \
            -C "${{ env.CLANG_DIR }}"

      - name: Verify Clang
        run: |
          "${{ env.CLANG_DIR }}/bin/clang" --version
          echo "GLIBC: $(ldd --version | head -1)"

      # ─── 4. Integrate KernelSU Next ──────────────────────────────────────────
      - name: Integrate KernelSU Next
        run: |
          KSUN_BRANCH="${{ github.event.inputs.ksun_branch || 'stable' }}"
          echo "==> Integrating KernelSU Next branch: ${KSUN_BRANCH}"
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s "${KSUN_BRANCH}"

          # Confirm the KernelSU-Next directory was created
          if [ -d "KernelSU-Next" ]; then
            echo "==> KernelSU-Next directory: OK"
            grep "KSUVER\|KSU_VERSION" KernelSU-Next/kernel/Makefile 2>/dev/null || true
          elif [ -d "KernelSU" ]; then
            echo "==> KernelSU directory: OK"
            grep "KSUVER\|KSU_VERSION" KernelSU/kernel/Makefile 2>/dev/null || true
          else
            echo "ERROR: KernelSU-Next was not cloned!"
            exit 1
          fi

      # ─── 5. Inject KSU kprobe configs into defconfig ─────────────────────────
      #
      # lisa (SM8350) runs a 5.4 non-GKI kernel. KernelSU Next uses kprobe hooks
      # on 5.4. sucompat.c (which requires linux/pgtable.h from 5.8+) is only
      # compiled when kprobe hooks are DISABLED. Enabling the three configs below
      # forces the kprobe path and avoids the pgtable.h build error entirely.
      #
      - name: Inject KSU configs into defconfig
        run: |
          # Locate the defconfig on disk
          DEFCONFIG_PATH="arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG }}"
          if [ ! -f "$DEFCONFIG_PATH" ]; then
            # Some trees nest it under vendor/
            DEFCONFIG_PATH=$(find arch/${{ env.ARCH }}/configs -name "$(basename ${{ env.DEFCONFIG }})" | head -1)
          fi
          if [ -z "$DEFCONFIG_PATH" ] || [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "ERROR: Could not find defconfig at ${{ env.DEFCONFIG }}"
            find arch/${{ env.ARCH }}/configs -name "*.defconfig" | head -20
            exit 1
          fi
          echo "==> Patching defconfig: ${DEFCONFIG_PATH}"

          # Remove any existing KSU entries to avoid duplicates
          sed -i '/CONFIG_KSU/d' "$DEFCONFIG_PATH"
          sed -i '/CONFIG_KPROBES/d' "$DEFCONFIG_PATH"
          sed -i '/CONFIG_KPROBE_EVENTS/d' "$DEFCONFIG_PATH"

          # Append KSU + kprobe config
          cat >> "$DEFCONFIG_PATH" << 'EOF'

          # KernelSU Next — kprobe hooks (required for 5.4 non-GKI)
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_KSU_KPROBE_HOOKS=y
          EOF
          echo "==> Config injected:"
          grep -E "CONFIG_KSU|CONFIG_KPROBE" "$DEFCONFIG_PATH"

      # ─── 6. Set up PATH & metadata ───────────────────────────────────────────
      - name: Set up environment
        run: |
          echo "${{ env.CLANG_DIR }}/bin" >> $GITHUB_PATH
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV
          echo "KSUN_LABEL=${{ github.event.inputs.ksun_branch || 'stable' }}" >> $GITHUB_ENV

      # ─── 7. Build kernel ──────────────────────────────────────────────────────
      - name: Build kernel
        run: |
          mkdir -p "${{ env.OUT_DIR }}"
          CLANG_BIN="${{ env.CLANG_DIR }}/bin"

          MAKE_FLAGS=(
            O="${{ env.OUT_DIR }}"
            ARCH="${{ env.ARCH }}"
            CC="${CLANG_BIN}/clang"
            CLANG_TRIPLE="aarch64-linux-gnu-"
            CROSS_COMPILE="${{ env.CROSS_COMPILE }}"
            CROSS_COMPILE_ARM32="${{ env.CROSS_COMPILE_ARM32 }}"
            LD="${CLANG_BIN}/ld.lld"
            AR="${CLANG_BIN}/llvm-ar"
            NM="${CLANG_BIN}/llvm-nm"
            OBJCOPY="${CLANG_BIN}/llvm-objcopy"
            OBJDUMP="${CLANG_BIN}/llvm-objdump"
            STRIP="${CLANG_BIN}/llvm-strip"
            LLVM=1
            LLVM_IAS=1
          )

          echo "==> Clang: $("${CLANG_BIN}/clang" --version | head -1)"
          echo "==> Generating defconfig: ${{ env.DEFCONFIG }}"
          make "${MAKE_FLAGS[@]}" ${{ env.DEFCONFIG }}

          echo "==> Building with $(nproc) threads"
          make "${MAKE_FLAGS[@]}" -j$(nproc) 2>&1 | tee "${{ github.workspace }}/build.log"

          IMAGE="${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image"
          if [ ! -f "$IMAGE" ]; then
            echo "ERROR: Kernel Image not found — build failed!"
            exit 1
          fi
          echo "==> Build successful: $(du -sh "$IMAGE" | cut -f1)"

      # ─── 8. Package with AnyKernel3 ──────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git \
            "${{ github.workspace }}/AnyKernel3"

          cp "${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image" \
             "${{ github.workspace }}/AnyKernel3/"

          # Merge DTBs
          DTB_DIR="${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dts/vendor/qcom"
          if [ -d "$DTB_DIR" ]; then
            find "$DTB_DIR" -name "*.dtb" -exec cat {} + \
              > "${{ github.workspace }}/AnyKernel3/dtb"
            echo "==> DTBs merged"
          fi

          # Copy DTBO
          DTBO="${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img"
          [ -f "$DTBO" ] && cp "$DTBO" "${{ github.workspace }}/AnyKernel3/"

          cd "${{ github.workspace }}/AnyKernel3"
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/device.name1=/device.name1=lisa/' anykernel.sh

          ZIP_NAME="KSUNext_${{ env.KSUN_LABEL }}_lisa_${{ env.BUILD_DATE }}.zip"
          zip -r9 "${{ github.workspace }}/${ZIP_NAME}" . \
            -x ".git/*" -x "*.md" -x "LICENSE" -x "*.txt"

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "==> Package ready: ${ZIP_NAME}"

      # ─── 9. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ env.BUILD_DATE }}
          path: ${{ github.workspace }}/build.log
          retention-days: 7

      # ─── 10. GitHub Release (optional) ────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' && github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}
          name: "KernelSU Next (${{ env.KSUN_LABEL }}) — ${{ env.BUILD_DATE }}"
          body: |
            ## Kernel build for Xiaomi Lisa (SM8350)

            | Field        | Value |
            |---|---|
            | **Device**   | Xiaomi 11 Lite 5G NE (lisa) |
            | **SoC**      | Snapdragon 778G (SM7325) |
            | **Kernel**   | 5.4 (`${{ env.KERNEL_BRANCH }}`) |
            | **KSU Next** | `${{ env.KSUN_LABEL }}` |
            | **Commit**   | `${{ github.sha }}` |
            | **Date**     | ${{ env.BUILD_DATE }} |

            ### Flash instructions
            1. Boot into custom recovery (TWRP / OrangeFox)
            2. Flash the zip
            3. Reboot to system
            4. Install **KernelSU Next Manager** APK
          files: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
